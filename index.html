<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dna-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05050F" />
    <meta name="description" content="Discover your Scam Risk DNA — a gamified personality quiz revealing your unique vulnerability archetype and personalized safety tips." />
    <meta property="og:title" content="Scam Risk DNA — What's Your Archetype?" />
    <meta property="og:description" content="Take the quiz. Discover your risk personality. Learn how to protect yourself." />
    <meta property="og:type" content="website" />
    <title>Scam Risk DNA</title>
    <!-- FOUC prevention: apply theme class before React mounts -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('scam-risk-dna-theme');
          var isDark = s ? JSON.parse(s)?.state?.isDark !== false : true;
          if (!isDark) document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-bg-shell text-text-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
